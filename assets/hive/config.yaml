# hive project config — edit by hand or with: hivectl config set <k>=<v>
# Generated by 'hivectl init' on ${GENERATED_AT}

app: ${APP}                              # the app= label on every fired pod
repo: ${REPO}                            # https://github.com/<owner>/<name> — code AND issues live here
base_branch: main

cluster:
  context: ${CLUSTER_CONTEXT}            # kubectl context; empty = use whatever's current
  agents_namespace: agents               # shared pod pool
  app_namespace: ${APP}                  # per-app namespace for deployed services
  secret: ${APP}-creds                   # secret in agents/ ns referenced by Sandbox

defaults:
  # model: opus          # OPTIONAL flat override applied to ALL roles. Leave unset
  #                        to use the per-task policy (Opus for impl/driver, Sonnet
  #                        for review/qa). Never set a banned model (Fable 5 / Haiku).
  cost_limit_usd: 20
  # Per-sprint aggregate caps (pod-fire spend + fire count). These are SOFT
  # targets: the driver keeps driving through an overrun band and only hard-
  # stops at soft × (1 + overrun_pct/100). Counts pod fires only — the driver's
  # own orchestration tokens are bounded separately by the per-session cap.
  sprint_budget_usd: 200          # soft cap on per-sprint pod-fire spend
  sprint_max_agents: 100          # soft cap on per-sprint pod fires
  sprint_budget_overrun_pct: 50   # hard ceiling = soft cap × (1 + pct/100)
  qa_fold_rounds: 2               # max QA->fix->re-QA rounds before remainder spills to next sprint

# Optional — what `hivectl expose` should port-forward in addition to
# prometheus + headlamp + hivectl ui. Uncomment + fill in for your app.
# expose:
#   app:
#     namespace: prod      # k8s ns the app is deployed to
#     service: web         # svc name
#     port: 3000           # remote port on that svc
