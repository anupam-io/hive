# Shared credentials for the coding agent. PLACEHOLDERS ONLY.
#
#   kubectl -n agents create secret generic coding-agent-creds \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-xxxx \
#     --from-literal=GH_AUTH_TOKEN=ghp_xxxx
apiVersion: v1
kind: Secret
metadata:
  name: coding-agent-creds
  namespace: agents
type: Opaque
stringData:
  # Pick ONE Claude auth key:
  ANTHROPIC_API_KEY: "REPLACE_ME"          # Mode A: API-key billing
  # CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME"  # Mode B: subscription, via `claude setup-token`
  GH_AUTH_TOKEN: "REPLACE_ME"              # gh + git: issues, PRs, reviews, clones, orphan-branch pushes
